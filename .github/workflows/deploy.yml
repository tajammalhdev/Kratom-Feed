name: Deploy WordPress Theme

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Validate FTP secrets
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_SERVER_DIR: ${{ secrets.FTP_SERVER_DIR }}
        run: |
          missing=()
          [ -z "$FTP_SERVER" ] && missing+=("FTP_SERVER")
          [ -z "$FTP_USERNAME" ] && missing+=("FTP_USERNAME")
          [ -z "$FTP_PASSWORD" ] && missing+=("FTP_PASSWORD")
          [ -z "$FTP_SERVER_DIR" ] && missing+=("FTP_SERVER_DIR")

          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing required repository secrets: ${missing[*]}"
            echo ""
            echo "Create each one separately here:"
            echo "https://github.com/tajammalhdev/Kratom-Feed/settings/secrets/actions"
            echo ""
            echo "Use the Repository secrets tab (not Environment secrets, not Variables)."
            echo "Secret names must match exactly:"
            echo "  FTP_SERVER"
            echo "  FTP_USERNAME"
            echo "  FTP_PASSWORD"
            echo "  FTP_SERVER_DIR"
            exit 1
          fi

          echo "All 4 FTP secrets are present."

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          tools: composer:v2

      - name: Install PHP dependencies
        run: composer install --no-dev --prefer-dist --no-interaction --optimize-autoloader

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build theme assets
        run: |
          npm install
          npm run build:css

      - name: Upload Theme
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
          exclude: |
            **/.git*
            **/.github/**
            **/node_modules/**
            **/assets/src/**
            **/.vscode/**
            **/.env
            **/README.md
            **/package.json
            **/package-lock.json
            **/composer.json
            **/composer.lock
            **/gitignore.txt
            **/.gitignore
            **/.ftpignore
